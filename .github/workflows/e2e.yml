name: E2E

# Playwright end-to-end runs against the full Docker Compose stack. Heavy
# (5-10 min) so it only triggers on push to main and manually via dispatch,
# not on every PR.

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"   # diari a les 04:00 UTC com a smoke regular

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: apps/frontend/pnpm-lock.yaml

      - name: Install frontend deps (for Playwright runner)
        working-directory: apps/frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate JWT keypair
        run: |
          mkdir -p secrets
          openssl genpkey -algorithm RSA -out secrets/jwt_private.pem -pkeyopt rsa_keygen_bits:2048
          openssl rsa -pubout -in secrets/jwt_private.pem -out secrets/jwt_public.pem

      - name: Copy env example
        run: cp .env.example .env

      - name: Build and start stack
        run: |
          docker compose \
            -f infra/compose/docker-compose.yml \
            -f infra/compose/docker-compose.test.yml \
            --env-file .env \
            up -d --build

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8000/healthz > /dev/null; then
              echo "✓ Backend ready"
              exit 0
            fi
            echo "  Waiting... ($i/30)"
            sleep 5
          done
          echo "❌ Backend did not become healthy in time"
          docker compose -f infra/compose/docker-compose.yml -f infra/compose/docker-compose.test.yml logs backend
          exit 1

      - name: Migrate + seed deterministic E2E data
        run: |
          docker compose \
            -f infra/compose/docker-compose.yml \
            -f infra/compose/docker-compose.test.yml \
            --env-file .env \
            exec -T backend alembic upgrade head
          docker compose \
            -f infra/compose/docker-compose.yml \
            -f infra/compose/docker-compose.test.yml \
            --env-file .env \
            exec -T backend python -m app.scripts.seed_e2e

      - name: Run Playwright
        working-directory: apps/frontend
        env:
          E2E_BASE_URL: http://localhost:5173
        run: pnpm e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 14

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose \
            -f infra/compose/docker-compose.yml \
            -f infra/compose/docker-compose.test.yml \
            logs --no-color > docker-logs.txt
        continue-on-error: true

      - name: Upload docker logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: docker-logs
          path: docker-logs.txt

      - name: Tear down stack
        if: always()
        run: |
          docker compose \
            -f infra/compose/docker-compose.yml \
            -f infra/compose/docker-compose.test.yml \
            down -v
