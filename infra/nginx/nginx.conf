worker_processes auto;
worker_rlimit_nofile 4096;

events {
  worker_connections 2048;
}

http {
  # --- Logging ----------------------------------------------------------------
  log_format json escape=json
    '{"time":"$time_iso8601","ip":"$remote_addr","method":"$request_method",'
    '"uri":"$request_uri","status":$status,"bytes":$body_bytes_sent,'
    '"ref":"$http_referer","ua":"$http_user_agent","rt":$request_time}';
  access_log /var/log/nginx/access.log json;
  error_log  /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  client_max_body_size 6m;        # leaves headroom over the 5 MB upload cap
  server_tokens off;
  charset utf-8;

  gzip on;
  gzip_vary on;
  gzip_types text/plain text/css application/json application/javascript application/xml;

  # --- HTTP → HTTPS redirect --------------------------------------------------
  server {
    listen 80;
    server_name _;
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # --- Main HTTPS server ------------------------------------------------------
  server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/arxiu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arxiu/privkey.pem;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling (the cert chain must include intermediates)
    ssl_stapling on;
    ssl_stapling_verify on;

    include /etc/nginx/security-headers.conf;

    # API → backend
    location /api/ {
      proxy_pass http://backend:8000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Request-Id $request_id;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    # Health check (deny to public)
    location /healthz {
      proxy_pass http://backend:8000/healthz;
      access_log off;
    }

    # /metrics restricted to internal IPs only
    location = /metrics {
      allow 10.0.0.0/8;
      allow 172.16.0.0/12;
      allow 192.168.0.0/16;
      deny all;
      proxy_pass http://backend:8000/metrics;
      access_log off;
    }

    # Frontend SPA — served by the frontend container's nginx on port 8080
    location / {
      proxy_pass http://frontend:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }
}
