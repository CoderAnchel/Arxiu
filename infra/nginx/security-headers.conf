# OWASP-recommended response headers. Mirrors what app/core/middleware.py
# already emits — the reverse proxy version is a defence-in-depth.

# HSTS: 2 years, includeSubDomains, preload-eligible
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Prevent MIME-sniffing
add_header X-Content-Type-Options "nosniff" always;

# Disallow being embedded in any frame (legacy + modern)
add_header X-Frame-Options "DENY" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'" always;

# Restrict referrer leakage
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions-Policy: deny powerful APIs that we don't use
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;

# Cross-origin isolation
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-site" always;
