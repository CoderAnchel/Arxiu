server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Security headers (further hardened by the outer reverse proxy in production)
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Hashed assets get long-term caching
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — all other routes resolve to index.html
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # No backend proxying here — the outer reverse proxy routes /api/v1 → backend service.

  location = /healthz-frontend {
    access_log off;
    return 200 "ok\n";
  }
}
